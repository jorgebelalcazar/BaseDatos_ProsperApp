services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: prosperapp
      POSTGRES_USER: prosperapp
      POSTGRES_PASSWORD: prosperapp123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema_seed.sql:/docker-entrypoint-initdb.d/01-schema-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prosperapp -d prosperapp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://prosperapp:prosperapp123@postgres:5432/prosperapp
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
